name: Convert Chrome Extension -> Safari Web Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  convert-and-build:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Convert
        run: |
          set -e
          CLEAN_DIR="./clean_source"
          mkdir -p "$CLEAN_DIR"
          rsync -a --exclude='.git' ./ "$CLEAN_DIR/"
          BUILD_DIR="./safari_build"
          mkdir -p "$BUILD_DIR"
          xcrun safari-web-extension-converter "$CLEAN_DIR" \
            --project-location "$BUILD_DIR" \
            --bundle-identifier "com.collegesouti.safari" \
            --no-open

      - name: Patch extension bundle ID
        run: |
          set -e
          BUILD_DIR="./safari_build"
          find "$BUILD_DIR" \( -name "*.swift" -o -name "Info.plist" \) -print0 | xargs -0 sed -i '' 's/-------/safari/g'

      - name: Replace ViewController with auto-launch
        shell: bash
        run: |
          set -e
          BUILD_DIR="./safari_build"
          VC_FILE=$(find "$BUILD_DIR" -name "ViewController.swift" -type f | head -1)
          echo "VC file: $VC_FILE"
          EXT_ID=$(grep "extensionBundleIdentifier" "$VC_FILE" | sed 's/.*"\(.*\)".*/\1/')
          echo "Extension ID: $EXT_ID"
          if [ -z "$EXT_ID" ]; then
            echo "ERROR: Could not extract extension ID"
            exit 1
          fi
          cat > "$VC_FILE" << SWIFT
import Cocoa
import SafariServices

let extensionBundleIdentifier = "$EXT_ID"

class ViewController: NSViewController {
    
    override func viewDidAppear() {
        super.viewDidAppear()
        SFSafariApplication.showPreferencesForExtension(withIdentifier: extensionBundleIdentifier) { error in
            if let error = error {
                print("Error: \(error.localizedDescription)")
            }
            DispatchQueue.main.async {
                NSApplication.shared.terminate(nil)
            }
        }
    }
    
}
SWIFT

      - name: Build
        run: |
          set -e
          BUILD_DIR="./safari_build"
          PROJECT_PATH=$(find "$BUILD_DIR" -name "*.xcodeproj" -type d | head -n1)
          SCHEME=$(xcodebuild -project "$PROJECT_PATH" -list 2>&1 | grep "(macOS)" | head -n1 | sed 's/^[[:space:]]*//')
          rm -rf "$BUILD_DIR/build"
          xcodebuild -project "$PROJECT_PATH" -scheme "$SCHEME" -configuration Release \
            BUILD_DIR="$(pwd)/$BUILD_DIR/build" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            -allowProvisioningUpdates build 2>&1

      - name: Package
        run: |
          set -e
          BUILD_DIR="./safari_build"
          APP_PATH=$(find "$BUILD_DIR" -name "*.app" -maxdepth 8 -type d | head -n1)
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$BUILD_DIR/safari-extension-build.zip"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: safari-extension-build
          path: safari_build/*.zip
