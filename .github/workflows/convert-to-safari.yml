name: Convert Chrome Extension -> Safari Web Extension

on:
  workflow_dispatch:

jobs:
  convert-and-build:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Convert
        run: |
          set -e
          CLEAN_DIR="./clean_source"
          mkdir -p "$CLEAN_DIR"
          rsync -a --exclude='.git' ./ "$CLEAN_DIR/"
          BUILD_DIR="./safari_build"
          mkdir -p "$BUILD_DIR"
          xcrun safari-web-extension-converter "$CLEAN_DIR" \
            --project-location "$BUILD_DIR" \
            --bundle-identifier "com.collegesouti.safari" \
            --no-open

      - name: Patch bundle identifiers
        run: |
          set -e
          BUILD_DIR="./safari_build"
          
          # Fix the ViewController.swift - replace all occurrences of ------- in bundle ID
          find "$BUILD_DIR" -name "ViewController.swift" -exec sed -i '' 's/-------\.Extension/safari.Extension/g' {} \;
          find "$BUILD_DIR" -name "ViewController.swift" -exec sed -i '' 's/-------/safari/g' {} \;
          
          # Fix Info.plist for the extension
          find "$BUILD_DIR" -name "Info.plist" -path "*/Extension/*" -exec sed -i '' 's/-------/safari/g' {} \;
          
          echo "=== Patched ViewController.swift ==="
          grep -n "extensionBundleIdentifier" $(find "$BUILD_DIR" -name "ViewController.swift")
          
          echo ""
          echo "=== Extension Info.plist bundle IDs ==="
          find "$BUILD_DIR" -path "*/Extension/*" -name "Info.plist" -exec grep -A1 "CFBundleIdentifier" {} \;

      - name: Build
        run: |
          set -e
          BUILD_DIR="./safari_build"
          PROJECT_PATH=$(find "$BUILD_DIR" -name "*.xcodeproj" -type d | head -n1)
          SCHEME=$(xcodebuild -project "$PROJECT_PATH" -list 2>&1 | grep "(macOS)" | head -n1 | sed 's/^[[:space:]]*//')
          rm -rf "$BUILD_DIR/build"
          xcodebuild -project "$PROJECT_PATH" -scheme "$SCHEME" -configuration Release \
            BUILD_DIR="$(pwd)/$BUILD_DIR/build" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            -allowProvisioningUpdates build 2>&1

      - name: Package
        run: |
          set -e
          BUILD_DIR="./safari_build"
          APP_PATH=$(find "$BUILD_DIR" -name "*.app" -maxdepth 8 -type d | head -n1)
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$BUILD_DIR/safari-extension-build.zip"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: safari-extension-build
          path: safari_build/*.zip
