name: Build Safari Extension

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - run: |
          mkdir -p clean_source
          rsync -a --exclude='.git' ./ clean_source/
          mkdir -p safari_build
          xcrun safari-web-extension-converter clean_source --project-location safari_build --bundle-identifier "com.collegesouti.safari" --no-open

      - run: |
          find safari_build -name "*.swift" -print0 | xargs -0 sed -i '' 's/-------/safari/g'
          find safari_build -name "Info.plist" -print0 | xargs -0 sed -i '' 's/-------/safari/g'

      - run: python3 .github/scripts/patch_viewcontroller.py

      - run: |
          PROJ=$(find safari_build -name "*.xcodeproj" -type d | head -n1)
          SCHEME=$(xcodebuild -project "$PROJ" -list | grep "(macOS)" | head -n1 | sed 's/^[[:space:]]*//')
          rm -rf safari_build/build
          xcodebuild -project "$PROJ" -scheme "$SCHEME" -configuration Release BUILD_DIR="$PWD/safari_build/build" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" -allowProvisioningUpdates build

      - run: |
          APP=$(find safari_build -name "*.app" -maxdepth 8 -type d | head -n1)
          ditto -c -k --sequesterRsrc --keepParent "$APP" safari_build/safari-extension-build.zip

      - uses: actions/upload-artifact@v4
        with:
          name: safari-extension-build
          path: safari_build/*.zip
